<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Display</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body 
    {
        min-height: 100vh;
        background: radial-gradient(ellipse at center, #ffffff 0%, #ffffff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .win-bg 
    {
        display: block;
        margin: 0 auto;
        border-radius: 16px;
        width: 1000px;
        height: 620px;
        object-fit: cover;
    }
</style>
</head>
<body>

    <img class="win-bg" src="static/bg/win_bg_2.jpg" alt="Window Background" />

</body>
</html>
