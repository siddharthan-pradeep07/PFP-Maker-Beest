<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFP Maker || Beest</title>
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<div class="win-bg-wrapper">
    <img class="win-bg" src="static/bg/win_bg_4.jpg" alt="Window Background" />
    <div class="preview-box">
        <img id="preview-img" src="" alt="Preview" />
    </div>
    <div class="toggle-bar">
        <button class="active">Background</button>
        <button>Character</button>
        <button>Shirts</button>
        <button>Eyes</button>
        <button>Head ons</button>
        <button>Mouth</button>
        <button>Cheeks</button>
        <button>Extra</button>
    </div>
<div class="snippet-panel" id="snippet-panel">

        <div class="snippet-grid" data-tab="Background">
            <img src="static/snipets/background/bg-1.png" alt="bg-1" />
            <img src="static/snipets/background/bg-2.png" alt="bg-2" />
            <img src="static/snipets/background/bg-3.png" alt="bg-3" />
            <img src="static/snipets/background/bg-4.png" alt="bg-4" />
            <img src="static/snipets/background/bg-5.png" alt="bg-5" />
            <img src="static/snipets/background/bg-6.png" alt="bg-6" />
            <img src="static/snipets/background/bg-7.png" alt="bg-7" />
        </div>

        <div class="snippet-grid" data-tab="Character">
            <img src="static/snipets/character/char-1.png" alt="char-1" />
            <img src="static/snipets/character/char-2.png" alt="char-2" />
            <img src="static/snipets/character/char-3.png" alt="char-3" />
            <img src="static/snipets/character/char-4.png" alt="char-4" />
            <img src="static/snipets/character/char-5.png" alt="char-5" />
            <img src="static/snipets/character/char-6.png" alt="char-6" />
            <img src="static/snipets/character/char-7.png" alt="char-7" />
            <img src="static/snipets/empty/empty.png" alt="empty" />
        </div>
    </div>
</div>

<script src="src/script.js"></script>
</body>
</html>
